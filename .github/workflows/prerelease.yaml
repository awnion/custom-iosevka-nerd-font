name: Pre-release

on:
  workflow_run:
    workflows: [PR]
    types: [completed]

permissions:
  contents: write

env:
  FONT_NAME: afio

jobs:
  prerelease:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'v') &&
      endsWith(github.event.workflow_run.head_branch, '-rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate VERSION matches branch
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          EXPECTED="v${VERSION}-rc"
          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "::error::Branch ($BRANCH) does not match VERSION ($EXPECTED)"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Find PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --json number -q '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No PR found for branch ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Check release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view "${{ steps.pr.outputs.number }}" \
            --json body -q .body)
          if [ -z "$PR_BODY" ]; then
            echo "::error::Release notes required in PR description for RC branches"
            exit 1
          fi

      - name: Download font artifact from PR workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _output
          gh run download "${{ github.event.workflow_run.id }}" \
            --name font-build --dir _output

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          RC_TAG="v${VERSION}-rc.${{ github.event.workflow_run.run_number }}"

          mv _output/${FONT_NAME}-*.zip "_output/${FONT_NAME}-${RC_TAG}.zip"

          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/${RC_TAG}" \
            -f sha="${SHA}"

          gh pr view "${{ steps.pr.outputs.number }}" \
            --json body -q .body > /tmp/notes.md

          gh release create "$RC_TAG" \
            "_output/${FONT_NAME}-${RC_TAG}.zip" \
            --prerelease \
            --title "$RC_TAG" \
            --notes-file /tmp/notes.md
