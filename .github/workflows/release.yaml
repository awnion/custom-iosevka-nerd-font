name: Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: "RC PR number (manual retry)"
        required: true
        type: number

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  FONT_NAME: afio

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'v') &&
       endsWith(github.head_ref, '-rc'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gather PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr-number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName)
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          MERGED=$(gh pr view "$PR_NUMBER" --json merged -q .merged)
          MERGE_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq '.mergeCommit.oid')

          if [ "$MERGED" != "true" ]; then
            echo "::error::PR #${PR_NUMBER} is not merged"
            exit 1
          fi

          if [[ ! "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc$ ]]; then
            echo "::error::Branch $BRANCH is not an RC branch (expected v*.*.*-rc)"
            exit 1
          fi

          VERSION=$(echo "$BRANCH" | sed 's/^v\(.*\)-rc$/\1/')
          TAG="v${VERSION}"

          FILE_VERSION=$(git show "${HEAD_SHA}:VERSION" | tr -d '[:space:]')
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match branch ($VERSION)"
            exit 1
          fi

          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Find latest pre-release
        id: prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pr.outputs.version }}
        run: |
          PRERELEASE_TAG=$(gh release list \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease and (.tagName | startswith(\"v${VERSION}-rc.\")))] | sort_by(.tagName) | last | .tagName")

          if [ -z "$PRERELEASE_TAG" ] || [ "$PRERELEASE_TAG" = "null" ]; then
            echo "::error::No pre-release found for v${VERSION}-rc.*"
            exit 1
          fi

          echo "Found pre-release: ${PRERELEASE_TAG}"
          echo "tag=${PRERELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        env:
          TAG: ${{ steps.pr.outputs.tag }}
          MERGE_SHA: ${{ steps.pr.outputs.merge_sha }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG" "$MERGE_SHA"
            git push origin "$TAG"
          fi

      - name: Promote pre-release to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE_TAG: ${{ steps.prerelease.outputs.tag }}
          TAG: ${{ steps.pr.outputs.tag }}
          VERSION: ${{ steps.pr.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          mkdir -p _output
          gh release download "$PRERELEASE_TAG" \
            --pattern "${FONT_NAME}-*" --dir _output

          RELEASE_INFO=$(gh api "repos/${{ github.repository }}/releases/tags/${PRERELEASE_TAG}")
          RELEASE_ID=$(echo "$RELEASE_INFO" | jq .id)
          ASSET_ID=$(echo "$RELEASE_INFO" | jq '.assets[0].id // empty')

          if [ -n "$ASSET_ID" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${ASSET_ID}"
          fi

          gh api -X PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -f tag_name="${TAG}" \
            -f name="${TAG}" \
            -F prerelease=false

          mv _output/${FONT_NAME}-*.zip "_output/${FONT_NAME}-${VERSION}.zip"
          gh release upload "${TAG}" "_output/${FONT_NAME}-${VERSION}.zip"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag docker image
        env:
          VERSION: ${{ steps.pr.outputs.version }}
          SHORT_SHA: ${{ steps.pr.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:sha-${SHORT_SHA}"
