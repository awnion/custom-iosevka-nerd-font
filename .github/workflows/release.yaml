name: Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: "RC PR number (manual retry)"
        required: true
        type: number

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  FONT_NAME: afio

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.head_ref, 'v') &&
       endsWith(github.head_ref, '-rc'))
    runs-on: ubuntu-latest
    steps:
      - name: Gather PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr-number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" \
            -R "${{ github.repository }}" \
            --json headRefName,headRefOid,state,mergeCommit)
          BRANCH=$(echo "$PR_JSON" | jq -r .headRefName)
          STATE=$(echo "$PR_JSON" | jq -r .state)
          HEAD_SHA=$(echo "$PR_JSON" | jq -r .headRefOid)
          MERGE_SHA=$(echo "$PR_JSON" | jq -r '.mergeCommit.oid')

          if [ "$STATE" != "MERGED" ]; then
            echo "::error::PR #${PR_NUMBER} is not merged (state: $STATE)"
            exit 1
          fi

          if [[ ! "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc$ ]]; then
            echo "::error::Branch $BRANCH is not an RC branch (expected v*.*.*-rc)"
            exit 1
          fi

          VERSION=$(echo "$BRANCH" | sed 's/^v\(.*\)-rc$/\1/')
          TAG="v${VERSION}"

          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Find pre-release for HEAD commit
        id: prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pr.outputs.version }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          TAG_REF=$(gh api "repos/${{ github.repository }}/git/matching-refs/tags/v${VERSION}-rc." \
            --jq "[.[] | select(.object.sha == \"${HEAD_SHA}\")] | last | .ref")

          if [ -z "$TAG_REF" ] || [ "$TAG_REF" = "null" ]; then
            echo "::error::No RC tag found at commit ${HEAD_SHA::7}"
            exit 1
          fi

          PRERELEASE_TAG="${TAG_REF#refs/tags/}"
          echo "Found pre-release: ${PRERELEASE_TAG}"
          echo "tag=${PRERELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE_TAG: ${{ steps.prerelease.outputs.tag }}
        run: |
          mkdir -p _output
          gh release download "$PRERELEASE_TAG" \
            -R "${{ github.repository }}" \
            --pattern "${FONT_NAME}-*" --dir _output

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pr.outputs.tag }}
          VERSION: ${{ steps.pr.outputs.version }}
          MERGE_SHA: ${{ steps.pr.outputs.merge_sha }}
          PRERELEASE_TAG: ${{ steps.prerelease.outputs.tag }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, verifying it points to ${MERGE_SHA::7}"
            EXISTING_SHA=$(gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" --jq .object.sha)
            if [ "$EXISTING_SHA" != "$MERGE_SHA" ]; then
              echo "::error::Tag $TAG exists but points to ${EXISTING_SHA::7}, expected ${MERGE_SHA::7}"
              exit 1
            fi
          else
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/${TAG}" \
              -f sha="${MERGE_SHA}"
          fi

          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          mv _output/${FONT_NAME}-*.zip "_output/${FONT_NAME}-${VERSION}.zip"

          gh release view "$PRERELEASE_TAG" \
            -R "${{ github.repository }}" \
            --json body -q .body > /tmp/notes.md

          gh release create "$TAG" \
            "_output/${FONT_NAME}-${VERSION}.zip" \
            -R "${{ github.repository }}" \
            --title "$TAG" \
            --latest \
            --notes-file /tmp/notes.md

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag docker image
        env:
          VERSION: ${{ steps.pr.outputs.version }}
          SHORT_SHA: ${{ steps.pr.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:sha-${SHORT_SHA}"
