name: PR

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  FONT_NAME: afio

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.refs.outputs.image_ref }}
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: sha
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "short=${SHA::7}" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: refs
        run: echo "image_ref=${{ env.IMAGE }}:sha-${{ steps.sha.outputs.short }}" >> "$GITHUB_OUTPUT"

  build-font:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build font
        env:
          IMAGE_REF: ${{ needs.build-image.outputs.image-ref }}
        run: ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: font-build
          path: _output/${{ env.FONT_NAME }}-*.zip

  visual-check:
    needs: build-font
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: font-build
          path: _output

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -yqq librsvg2-bin imagemagick

      - name: Install font
        run: |
          mkdir -p ~/.local/share/fonts
          unzip _output/${FONT_NAME}-*.zip -d ~/.local/share/fonts/
          fc-cache -fv

      - name: Generate showcase PNGs
        run: python3 src/generate_showcase_matrix.py --output-dir _generated

      - name: Pixel diff with reference
        run: |
          DIFF_FOUND=0
          mkdir -p _diffs
          for ref in docs/imgs/generated/*.png; do
            name=$(basename "$ref")
            gen="_generated/$name"
            if [ ! -f "$gen" ]; then
              echo "::error::Missing generated file: $name"
              DIFF_FOUND=1
              continue
            fi
            PIXELS=$(compare -metric AE "$ref" "$gen" "_diffs/$name" 2>&1 || true)
            if [ "$PIXELS" != "0" ]; then
              echo "::warning::$name: $PIXELS pixels differ"
              DIFF_FOUND=1
            else
              rm -f "_diffs/$name"
            fi
          done
          if [ "$DIFF_FOUND" -eq 1 ]; then
            echo "::error::Visual regression detected"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: _diffs/

  prerelease:
    needs: visual-check
    if: startsWith(github.head_ref, 'v') && endsWith(github.head_ref, '-rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate VERSION matches branch
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          BRANCH="${{ github.head_ref }}"
          EXPECTED="v${VERSION}-rc"
          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "::error::Branch ($BRANCH) does not match VERSION ($EXPECTED)"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Check PR approval
        id: approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DECISION=$(gh pr view ${{ github.event.pull_request.number }} \
            --json reviewDecision -q .reviewDecision)
          if [ "$DECISION" != "APPROVED" ]; then
            echo "::notice::PR not approved yet, skipping pre-release"
            echo "approved=false" >> "$GITHUB_OUTPUT"
          else
            echo "approved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release notes
        if: steps.approval.outputs.approved == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::Release notes required in PR description for RC branches"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        if: steps.approval.outputs.approved == 'true'
        with:
          name: font-build
          path: _output

      - name: Create pre-release
        if: steps.approval.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          RC_TAG="v${VERSION}-rc.${{ github.run_number }}"

          mv _output/${FONT_NAME}-*.zip "_output/${FONT_NAME}-${RC_TAG}.zip"

          git tag "$RC_TAG" "$SHA"
          git push origin "$RC_TAG"

          gh pr view ${{ github.event.pull_request.number }} \
            --json body -q .body > /tmp/notes.md

          gh release create "$RC_TAG" \
            "_output/${FONT_NAME}-${RC_TAG}.zip" \
            --prerelease \
            --title "$RC_TAG" \
            --notes-file /tmp/notes.md
