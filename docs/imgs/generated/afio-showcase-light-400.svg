    <text class="line-no" x="20" y="134">2</text>
    <text x="54" y="134"><tspan class="key">"editor.fontSize"</tspan><tspan class="fg">: </tspan><tspan class="number">16</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="20" y="160">3</text>
    <text x="54" y="160"><tspan class="key">"editor.fontLigatures"</tspan><tspan class="fg">: </tspan><tspan class="kw">false</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="20" y="186">4</text>
    <text x="54" y="186"><tspan class="key">"editor.fontWeight"</tspan><tspan class="fg">: </tspan><tspan class="string">"400"</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="20" y="212">5</text>
    <text x="54" y="212"><tspan class="key">"editor.lineHeight"</tspan><tspan class="fg">: </tspan><tspan class="number">20</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="20" y="238">6</text>
    <text x="54" y="238"><tspan class="key">"editor.cursorSurroundingLines"</tspan><tspan class="fg">: </tspan><tspan class="number">5</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="20" y="264">7</text>
    <text class="comment" x="54" y="264">// Terminal fonts example: [({[]})] iIlL1j $#% wvmga 69</text>
    <text class="line-no" x="20" y="290">8</text>
    <text class="comment" x="54" y="290">// Delta compression using up to 12 threads</text>
    <text class="line-no" x="20" y="316">9</text>
    <text class="comment" x="54" y="316">// git@github.com:awnion/custom-iosevka-nerd-font.git</text>
    <text class="line-no" x="9" y="342">10</text>
    <text class="comment" x="54" y="342">// 00123456789 ==&gt; шла маша по шоссе +++ === != &gt;= &lt;=</text>
    <text class="line-no" x="9" y="368">11</text>
    <text class="comment" x="54" y="368">//     ╭─ ~/src ██ master █ git remote add origin git@github.com:awnion/myfonts.git</text>
    <text class="line-no" x="9" y="394">12</text>
    <text class="comment" x="54" y="394">//       ╭─ ~/src  master █ </text>
    <text class="line-no" x="9" y="420">13</text>
    <text class="comment" x="54" y="420">//     ╰─ █              █</text>
    <text class="line-no" x="9" y="446">14</text>
    <text class="comment" x="54" y="446">// =</text>
    <text class="line-no" x="9" y="472">15</text>
    <text class="comment" x="54" y="472">//  =</text>
    <text class="line-no" x="9" y="498">16</text>
    <text class="comment" x="54" y="498">//  "  (uv-env) 100%</text>
    <text class="line-no" x="9" y="524">17</text>
    <text class="comment" x="54" y="524">//  main   zsh   build  release</text>
    <text class="line-no" x="9" y="550">18</text>
    <text class="comment" x="54" y="550">//  README.md   src/lib.rs   ./dist</text>
    <text class="line-no" x="9" y="576">19</text>
    <text class="comment" x="54" y="576">// +++ === != >= </text>
    <text class="line-no" x="9" y="602">20</text>
    <text class="comment" x="54" y="602">// [({[]})] iIlL1j $#% wvmga 69</text>
  </g>

  <g clip-path="url(#pyClip)" transform="translate(0 -28)">
    <text class="line-no" x="535" y="108">1</text>
    <text x="569" y="108"><tspan class="kw">from</tspan><tspan class="fg"> __future__ </tspan><tspan class="kw">import</tspan><tspan class="fg"> annotations</tspan></text>
    <text class="line-no" x="535" y="142">2</text>
    <text x="569" y="142"><tspan class="kw">import</tspan><tspan class="fg"> asyncio</tspan></text>
    <text class="line-no" x="535" y="176">3</text>
    <text x="569" y="176"><tspan class="kw">from</tspan><tspan class="fg"> dataclasses </tspan><tspan class="kw">import</tspan><tspan class="fg"> dataclass</tspan></text>
    <text class="line-no" x="535" y="210">4</text>
    <text x="569" y="210"><tspan class="kw">from</tspan><tspan class="fg"> pathlib </tspan><tspan class="kw">import</tspan><tspan class="fg"> Path</tspan></text>
    <text class="line-no" x="535" y="244">5</text>
    <text class="line-no" x="535" y="278">6</text>
    <text x="569" y="278"><tspan class="decor">@dataclass</tspan><tspan class="fg">(slots=</tspan><tspan class="kw">True</tspan><tspan class="fg">)</tspan></text>
    <text class="line-no" x="535" y="312">7</text>
    <text x="569" y="312"><tspan class="kw">class</tspan><tspan class="type"> FontPreview</tspan><tspan class="fg">:</tspan></text>
    <text class="line-no" x="535" y="346">8</text>
    <text x="569" y="346"><tspan class="fg">    family: </tspan><tspan class="type">str</tspan></text>
    <text class="line-no" x="535" y="380">9</text>
    <text x="569" y="380"><tspan class="fg">    size: </tspan><tspan class="type">int</tspan><tspan class="fg"> = </tspan><tspan class="number">16</tspan></text>
    <text class="line-no" x="524" y="414">10</text>
    <text class="line-no" x="524" y="448">11</text>
    <text x="569" y="448"><tspan class="kw">async def</tspan><tspan class="call"> render</tspan><tspan class="fg">(font: </tspan><tspan class="type">FontPreview</tspan><tspan class="fg">, text: </tspan><tspan class="type">str</tspan><tspan class="fg">) -&gt; </tspan><tspan class="type">dict</tspan><tspan class="fg">[</tspan><tspan class="type">str</tspan><tspan class="fg">, </tspan><tspan class="type">int</tspan><tspan class="fg">]:</tspan></text>
    <text class="line-no" x="524" y="482">12</text>
    <text x="569" y="482"><tspan class="string">    """Render metrics and spacing hints for the preview."""</tspan></text>
    <text class="line-no" x="524" y="516">13</text>
    <text x="569" y="516"><tspan class="fg">    widths = {op: len(op) </tspan><tspan class="kw">for</tspan><tspan class="fg"> op </tspan><tspan class="kw">in</tspan><tspan class="string"> ["!=", "&gt;=", "&lt;=", "==&gt;"]</tspan><tspan class="fg">}</tspan></text>
    <text class="line-no" x="524" y="550">14</text>
    <text x="569" y="550"><tspan class="fg">    </tspan><tspan class="kw">if</tspan><tspan class="fg"> missing := [c </tspan><tspan class="kw">for</tspan><tspan class="fg"> c </tspan><tspan class="kw">in</tspan><tspan class="fg"> text </tspan><tspan class="kw">if</tspan><tspan class="fg"> c.isspace()]:</tspan></text>
    <text class="line-no" x="524" y="584">15</text>
    <text x="569" y="584"><tspan class="fg">        </tspan><tspan class="kw">return</tspan><tspan class="fg"> {</tspan><tspan class="string">"lines"</tspan><tspan class="fg">: text.count(</tspan><tspan class="string">"\n"</tspan><tspan class="fg">) + </tspan><tspan class="number">1</tspan><tspan class="fg">, </tspan><tspan class="string">"spaces"</tspan><tspan class="fg">: len(missing)}</tspan></text>
    <text class="line-no" x="524" y="618">16</text>
    <text x="569" y="618"><tspan class="fg">    </tspan><tspan class="kw">match</tspan><tspan class="fg"> font.size:</tspan></text>
    <text class="line-no" x="524" y="652">17</text>
    <text x="569" y="652"><tspan class="fg">        </tspan><tspan class="kw">case</tspan><tspan class="number"> 16</tspan><tspan class="fg"> | </tspan><tspan class="number">18</tspan><tspan class="fg">: </tspan><tspan class="kw">return</tspan><tspan class="fg"> {</tspan><tspan class="string">"pixels"</tspan><tspan class="fg">: len(text) * font.size}</tspan></text>
    <text class="line-no" x="524" y="686">18</text>
    <text x="569" y="686"><tspan class="fg">        </tspan><tspan class="kw">case</tspan><tspan class="fg"> _: </tspan><tspan class="kw">raise</tspan><tspan class="fg"> </tspan><tspan class="type">ValueError</tspan><tspan class="fg">(</tspan><tspan class="string">f"unsupported size: {font.size}"</tspan><tspan class="fg">)</tspan></text>
  </g>

