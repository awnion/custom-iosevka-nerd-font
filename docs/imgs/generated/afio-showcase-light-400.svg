    <text x="1084" y="108"><tspan class="kw">use</tspan><tspan class="fg"> anyhow::{</tspan><tspan class="type">Context</tspan><tspan class="fg">, </tspan><tspan class="type">Result</tspan><tspan class="fg">};</tspan></text>
    <text class="line-no" x="1050" y="142">2</text>
    <text x="1084" y="142"><tspan class="kw">use</tspan><tspan class="fg"> serde::{</tspan><tspan class="type">Deserialize</tspan><tspan class="fg">, </tspan><tspan class="type">Serialize</tspan><tspan class="fg">};</tspan></text>
    <text class="line-no" x="1050" y="176">3</text>
    <text x="1084" y="176"><tspan class="kw">use</tspan><tspan class="fg"> std::{collections::</tspan><tspan class="type">BTreeMap</tspan><tspan class="fg">, path::</tspan><tspan class="type">PathBuf</tspan><tspan class="fg">};</tspan></text>
    <text class="line-no" x="1050" y="210">4</text>
    <text class="line-no" x="1050" y="244">5</text>
    <text x="1084" y="244"><tspan class="decor">#[derive(</tspan><tspan class="type">Debug</tspan><tspan class="decor">, </tspan><tspan class="type">Clone</tspan><tspan class="decor">, </tspan><tspan class="type">Serialize</tspan><tspan class="decor">, </tspan><tspan class="type">Deserialize</tspan><tspan class="decor">)]</tspan></text>
    <text class="line-no" x="1050" y="278">6</text>
    <text x="1084" y="278"><tspan class="kw">pub struct</tspan><tspan class="type"> FontPreview</tspan><tspan class="fg">&lt;'a&gt; {</tspan></text>
    <text class="line-no" x="1050" y="312">7</text>
    <text x="1084" y="312"><tspan class="fg">    </tspan><tspan class="kw">pub</tspan><tspan class="field"> family</tspan><tspan class="fg">: &amp;'a </tspan><tspan class="type">str</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="1050" y="346">8</text>
    <text x="1084" y="346"><tspan class="fg">    </tspan><tspan class="kw">pub</tspan><tspan class="field"> size</tspan><tspan class="fg">: </tspan><tspan class="type">u16</tspan><tspan class="fg">,</tspan></text>
    <text class="line-no" x="1050" y="380">9</text>
    <text x="1084" y="380"><tspan class="fg">}</tspan></text>
    <text class="line-no" x="1050" y="414">10</text>
    <text class="line-no" x="1039" y="448">11</text>
    <text x="1084" y="448"><tspan class="comment">/// Render preview metrics for ligatures and spacing.</tspan></text>
    <text class="line-no" x="1039" y="482">12</text>
    <text x="1084" y="482"><tspan class="kw">pub fn</tspan><tspan class="call"> render</tspan><tspan class="fg">(font: &amp;</tspan><tspan class="type">FontPreview</tspan><tspan class="fg">&lt;'_&gt;, text: &amp;</tspan><tspan class="type">str</tspan><tspan class="fg">) -&gt; </tspan><tspan class="type">Result</tspan><tspan class="fg">&lt;</tspan><tspan class="type">BTreeMap</tspan><tspan class="fg">&lt;&amp;'static str, usize&gt;&gt; {</tspan></text>
    <text class="line-no" x="1039" y="516">13</text>
    <text x="1084" y="516"><tspan class="fg">    </tspan><tspan class="kw">let</tspan><tspan class="fg"> widths = [</tspan><tspan class="string">"!="</tspan><tspan class="fg">, </tspan><tspan class="string">"&gt;="</tspan><tspan class="fg">, </tspan><tspan class="string">"&lt;="</tspan><tspan class="fg">, </tspan><tspan class="string">"==&gt;"</tspan><tspan class="fg">]</tspan></text>
    <text class="line-no" x="1039" y="550">14</text>
    <text x="1084" y="550"><tspan class="fg">        .into_iter().map(|op| (op, op.chars().count())).collect::&lt;</tspan><tspan class="type">BTreeMap</tspan><tspan class="fg">&lt;_, _&gt;&gt;();</tspan></text>
    <text class="line-no" x="1039" y="584">15</text>
    <text x="1084" y="584"><tspan class="fg">    </tspan><tspan class="kw">Ok</tspan><tspan class="fg">(</tspan><tspan class="type">BTreeMap</tspan><tspan class="fg">::from([</tspan></text>
    <text class="line-no" x="1039" y="618">16</text>
    <text x="1084" y="618"><tspan class="fg">        (</tspan><tspan class="string">"pixels"</tspan><tspan class="fg">, text.chars().count() * usize::from(font.size)),</tspan></text>
    <text class="line-no" x="1039" y="652">17</text>
    <text x="1084" y="652"><tspan class="fg">        (</tspan><tspan class="string">"ops"</tspan><tspan class="fg">, widths.get(</tspan><tspan class="string">"==&gt;"</tspan><tspan class="fg">).copied().</tspan><tspan class="call">context</tspan><tspan class="fg">(</tspan><tspan class="string">"missing ligature"</tspan><tspan class="fg">)?),</tspan></text>
    <text class="line-no" x="1039" y="686">18</text>
    <text x="1084" y="686"><tspan class="fg">    ]))</tspan></text>
    <text class="line-no" x="1039" y="720">19</text>
    <text x="1084" y="720"><tspan class="fg">}</tspan></text>
  </g>
