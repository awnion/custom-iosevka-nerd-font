<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="720" viewBox="0 0 1544 720" role="img" aria-labelledby="title desc" xml:space="preserve">
  <title id="title">AFIO light theme showcase</title>
  <desc id="desc">Light theme code showcase for JSON, Python, and Rust using the AFIO font.</desc>
  <defs>
    <clipPath id="jsonClip">
      <rect x="0" y="78" width="492" height="614" />
    </clipPath>
    <clipPath id="pyClip">
      <rect x="569" y="78" width="438" height="614" />
