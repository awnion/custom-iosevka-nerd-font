  <style>
    text {
      font-family: "afio", "AFIO", "afio Nerd Font Mono", "Iosevka Custom", "Iosevka Nerd Font", "Iosevka", monospace;
      font-size: 21px;
      font-weight: 400;
      font-variant-ligatures: common-ligatures discretionary-ligatures contextual;
      font-feature-settings: "calt" 1, "liga" 1, "dlig" 1;
      text-rendering: geometricPrecision;
    }

    .pane-title { fill: #6a737d; font-size: 15px; font-weight: 600; letter-spacing: 0.08em; }
    .line-no { fill: #c3c5cb; opacity: 0.8; }
    .fg { fill: #1a1a00; }
    .comment { fill: #6a737d; }
    .key { fill: #d73a49; }
    .kw { fill: #d73a49; }
    .string { fill: #22863a; }
    .number { fill: #005cc5; }
    .type { fill: #6f42c1; }
    .decor { fill: #005cc5; }
    .call { fill: #6f42c1; }
    .field { fill: #1a1a00; }
  </style>

